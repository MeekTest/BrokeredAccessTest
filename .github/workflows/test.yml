name: Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from 1Password
        id: op
        uses: 1Password/load-secrets-action@v5beta
        with:
          export-env: true
        env:
          OP_WORKLOAD_ID: "NAS3LPVZE5CD5N2H675DCGSMUI"
          OP_ENVIRONMENT_ID: "ncfilqz6ygvy6whnkywhuhe64a"
          OP_INTEGRATION_KEY: ${{ secrets.OP_INTEGRATION_KEY }}
      
      - name: Verify secret
        run: |
          if [ -z "$TEST" ]; then
            echo "ERROR: Secret is empty"
            exit 1
          else
            echo "Secret loaded successfully (${#TEST} characters)"
          fi
